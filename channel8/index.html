<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Channel 8</title>
<style>
body {margin:0;font-family:Arial,sans-serif;background:black;color:white;display:flex;height:100vh;}
.tv-screen {flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
video,img {width:100%;height:100%;object-fit:cover;}
.channel-name {position:absolute;top:50px;left:20px;font-size:2rem;background:rgba(0,0,0,0.5);padding:5px 10px;border-radius:5px;z-index:15;}
.news-ticker {position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.7);color:lime;font-weight:bold;white-space:nowrap;overflow:hidden;z-index:15;}
.news-ticker p {display:inline-block;padding-left:100%;animation:scroll 20s linear infinite;margin:0;}
@keyframes scroll {0% { transform: translateX(0%);} 100% { transform: translateX(-100%);}}
#clock {position:absolute;top:50px;right:20px;font-size:1.5rem;background:rgba(0,0,0,0.5);padding:5px 10px;border-radius:5px;z-index:15;}
#techDiff,#apologyMode {display:none;position:absolute;top:0;left:0;width:100%;height:100%;z-index:100;background:black;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
#topBar {position:absolute;top:0;left:0;width:100%;height:40px;background:rgba(0,0,0,0.8);color:white;display:flex;align-items:center;padding:0 10px;z-index:200;}
#topBar span {font-weight:bold;margin-right:20px;cursor:pointer;}
#adminButtons {display:flex;gap:10px;align-items:center;}
button {padding:3px 8px;font-size:0.9rem;background-color:red;color:white;border:none;border-radius:3px;cursor:pointer;opacity:0.8;}
#apologyBtn {background:orange;color:black;}
</style>
</head>
<body>

<!-- Admin Tools -->
<div id="topBar">
    <span id="toggleBar">☰ Admin Tools</span>
    <div id="adminButtons">
        <button id="techBtn">Technical Difficulty</button>
        <button id="apologyBtn">Hijack/Apology</button>
    </div>
</div>

<div class="tv-screen">
    <div id="channelName" class="channel-name">Channel 8 - Main Broadcast</div>
    <div id="clock">00:00:00</div>
    <img id="channelGif" src="channel8_logo.gif" alt="Channel 8">
    <video id="tvVideo" autoplay muted style="display:none;"></video>
    <div class="news-ticker"><p id="ticker-text">Welcome to Channel 8! Stay tuned for shows and news updates.</p></div>
    <img id="techDiff" src="tech_diff.gif" alt="Technical Difficulty">
    <div id="apologyMode">
        <h1>📢 Message from Channel 8</h1>
        <p>We apologize for the recent broadcast interruption.</p>
        <p>Programming will resume shortly.</p>
    </div>
</div>

<script>
// Elements
const channelGif = document.getElementById('channelGif');
const videoEl = document.getElementById('tvVideo');
const tickerText = document.getElementById('ticker-text');
const channelName = document.getElementById('channelName');
const clock = document.getElementById('clock');
const channelMusic = document.getElementById('channelMusic');
const techDiff = document.getElementById('techDiff');
const apologyMode = document.getElementById('apologyMode');
const techBtn = document.getElementById('techBtn');
const apologyBtn = document.getElementById('apologyBtn');
const toggleBar = document.getElementById('toggleBar');
const adminButtons = document.getElementById('adminButtons');

let inTechnicalDifficulty=false;

// Initial display
apologyMode.style.display='none';
techDiff.style.display='none';
channelGif.style.display='block';
videoEl.style.display='none';

// Clock
function updateClock(){const now=new Date();clock.textContent=`${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;}
updateClock();setInterval(updateClock,1000);

// Ticker messages
const newsMessages = [
    "This Is Channel 8.",
    "Stay tuned for live shows and news updates.",
    "New program airing soon: Channel 8 Evening Show.",
    "Check our schedule for upcoming broadcasts."
];
let tickerIndex=0;
function updateTicker(){tickerText.textContent=newsMessages[tickerIndex];tickerIndex=(tickerIndex+1)%newsMessages.length;}
updateTicker();setInterval(updateTicker,15000);

// Enable music after first click
document.body.addEventListener('click',()=>{channelMusic.play().catch(()=>{});},{once:true});

// Admin buttons
toggleBar.addEventListener('click',()=>{adminButtons.style.display=(adminButtons.style.display==='none')?'flex':'none';});
techBtn.addEventListener('click',()=>{showTechnicalDifficulty(10000);});
apologyBtn.addEventListener('click',()=>{showApology(15000);});

// Technical Difficulty
function showTechnicalDifficulty(duration=10000){
    inTechnicalDifficulty=true;
    channelMusic.pause();
    videoEl.pause();
    channelGif.style.display='none';
    videoEl.style.display='none';
    apologyMode.style.display='none';
    techDiff.style.display='block';
    channelName.textContent="Channel 8 - Technical Difficulty";
    setTimeout(endTechnicalDifficulty,duration);
}
function endTechnicalDifficulty(){techDiff.style.display='none'; inTechnicalDifficulty=false; channelGif.style.display='block';}

// Apology / Hijack
function showApology(duration=15000){
    inTechnicalDifficulty=true;
    channelMusic.pause();
    videoEl.pause();
    channelGif.style.display='none';
    videoEl.style.display='none';
    techDiff.style.display='none';
    apologyMode.style.display='flex';
    channelName.textContent="Channel 8 - Hijack / Apology";
    setTimeout(endApology,duration);
}
function endApology(){apologyMode.style.display='none'; inTechnicalDifficulty=false; channelGif.style.display='block';}

</script>
</body>
</html>
