<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>RareTV</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* VIDEO / CONTENT AREA */
#content {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #000000, #111111);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 48px;
    letter-spacing: 2px;
}

/* SCREEN BUG */
#bug {
    position: absolute;
    top: 10px;
    right: 14px;
    font-size: 22px;
    font-weight: bold;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 6px 12px;
    border-radius: 6px;
}

/* LOWER THIRD */
#lower {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 14px;
    background: rgba(0,0,0,0.7);
    color: #00ffcc;
    font-size: 18px;
}
</style>
</head>

<body>

<div id="content">
    RareTV
</div>

<div id="bug">
    RareTV 🇷🇴
</div>

<div id="lower">
    Canal românesc • Conținut rar • Arhivă TV
</div>

</body>
</html>
