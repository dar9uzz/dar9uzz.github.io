<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Disney Channel</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

/* TV AREA */
#tv {
    position: relative;
    width: 100%;
    height: 100%;
}

/* VIDEO */
video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
}

/* LAUNCH IMAGE (native size) */
#launch {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    image-rendering: crisp-edges;
    z-index: 5;
    cursor: pointer;
}

/* SCREEN BUG – CENTERED, NATIVE SIZE */
#screenBug {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    image-rendering: crisp-edges;
    opacity: 0.95;
    z-index: 10;
    pointer-events: none;
}
</style>
</head>

<body>
<div id="tv">

    <!-- LAUNCH IMAGE WILL ACT AS START BUTTON -->
    <img id="launch" src="launch.png" alt="Click to Start">

    <!-- SCREEN BUG -->
    <img id="screenBug" src="sb.png" alt="Screen Bug">

    <!-- VIDEO PLAYER -->
    <video id="player" muted></video>

</div>

<script>
const player = document.getElementById("player");
const launch = document.getElementById("launch");

/* SIMPLE PLAYLIST */
const playlist = [
    "disny.mp4",
];

let i = 0;

/* CLICK TO START */
launch.onclick = () => {
    launch.style.display = "none"; // hide launch image

    player.muted = false; // unmute
    player.volume = 1;

    play();
};

/* PLAY FUNCTION */
function play() {
    player.src = playlist[i];
    player.load();
    player.play();
}

/* NEXT ITEM */
player.onended = () => {
    i = (i + 1) % playlist.length;
    play();
};
</script>

</body>
</html>
